name: Deploy and Sync

on:
  push:
    branches: [ main ]

jobs:
  update-status-start:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Start
        run: |
          curl -X POST https://${{ secrets.APP_URL }}/api/admin/system-status \
          -H "Content-Type: application/json" \
          -H "x-update-secret: ${{ secrets.UPDATE_SECRET }}" \
          -d '{
            "isUpdating": true,
            "progress": 10,
            "message": "Začíná proces nasazení nové verze...",
            "log": "CI/CD workflow spuštěno",
            "logType": "info",
            "clearLogs": true
          }'

  build-web:
    needs: update-status-start
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Notify Build Start
        run: |
          curl -X POST https://${{ secrets.APP_URL }}/api/admin/system-status \
          -H "Content-Type: application/json" \
          -H "x-update-secret: ${{ secrets.UPDATE_SECRET }}" \
          -d '{"progress": 30, "log": "Sestavování webové aplikace...", "message": "Sestavování webové aplikace"}'
      - name: Build Web
        run: npm run build
      - name: Trigger DeployHQ
        env:
          DEPLOYHQ_ACCOUNT: ${{ secrets.DEPLOYHQ_ACCOUNT }}
          DEPLOYHQ_USER: ${{ secrets.DEPLOYHQ_USER }}
          DEPLOYHQ_API_KEY: ${{ secrets.DEPLOYHQ_API_KEY }}
          DEPLOYHQ_PROJECT: ${{ secrets.DEPLOYHQ_PROJECT }}
          DEPLOYHQ_PARENT_IDENTIFIER: ${{ secrets.DEPLOYHQ_PARENT_IDENTIFIER }}
          DEPLOY_END_REV: ${{ github.sha }}
        run: |
          curl --fail --silent --show-error \
          -H "Content-type: application/json" \
          -H "Accept: application/json" \
          --user "${DEPLOYHQ_USER}:${DEPLOYHQ_API_KEY}" \
          -X POST \
          -d "{
            \"deployment\": {
              \"parent_identifier\": \"${DEPLOYHQ_PARENT_IDENTIFIER}\",
              \"start_revision\": \"\",
              \"end_revision\": \"${DEPLOY_END_REV}\",
              \"branch\": \"main\",
              \"mode\": \"queue\",
              \"copy_config_files\": true,
              \"run_build_commands\": true,
              \"use_build_cache\": true
            }
          }" \
          "https://${DEPLOYHQ_ACCOUNT}.deployhq.com/projects/${DEPLOYHQ_PROJECT}/deployments"
      - name: Notify Build Success
        run: |
          curl -X POST https://${{ secrets.APP_URL }}/api/admin/system-status \
          -H "Content-Type: application/json" \
          -H "x-update-secret: ${{ secrets.UPDATE_SECRET }}" \
          -d '{"progress": 60, "log": "Webová aplikace úspěšně sestavena", "logType": "success"}'

  build-mobile:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Notify Mobile Start
        run: |
          curl -X POST https://${{ secrets.APP_URL }}/api/admin/system-status \
          -H "Content-Type: application/json" \
          -H "x-update-secret: ${{ secrets.UPDATE_SECRET }}" \
          -d '{"progress": 70, "log": "Příprava mobilních aplikací (Expo)...", "message": "Synchronizace s mobilními platformami"}'
      - name: Install Mobile Deps
        run: cd mobile && npm install
      - name: Notify Success
        run: |
          curl -X POST https://${{ secrets.APP_URL }}/api/admin/system-status \
          -H "Content-Type: application/json" \
          -H "x-update-secret: ${{ secrets.UPDATE_SECRET }}" \
          -d '{
            "isUpdating": false,
            "progress": 100,
            "message": "Aktualizace dokončena! Všechny systémy jsou synchronizovány.",
            "log": "Nasazení dokončeno úspěšně na Web, iOS i Android",
            "logType": "success"
          }'
