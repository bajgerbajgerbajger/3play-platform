# ==========================================================
# 3Play - Production Domain Configuration for XAMPP
# ==========================================================

<VirtualHost *:80>
    # ZDE NAHRADTE svoji-domenou.cz VASI SKUTECNOU DOMENOU
    ServerName 3play.cz
    ServerAlias www.3play.cz

    ProxyPreserveHost On
    
    # Next.js Server (Port 3000)
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    # WebSocket Support (pro Next.js HMR a real-time funkce)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)           ws://localhost:3000/$1 [P,L]
    
    ErrorLog "logs/3play-error.log"
    CustomLog "logs/3play-access.log" common
</VirtualHost>

# Configuration for http://localhost/3play (Optional)
<Location /3play>
    ProxyPass http://localhost:3000/
    ProxyPassReverse http://localhost:3000/
</Location>
