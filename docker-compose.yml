services:
  migrate:
    build:
      context: .
      target: builder
    working_dir: /app
    command: sh -c "npx prisma db push"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - db-data:/data

  app:
    build:
      context: .
      target: runner
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - db-data:/data
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  db-data:
